name: Toffee Auto Updater

on:
  schedule:
    # Runs every 6 hours at the start of the hour (00:00, 06:00, 12:00, 18:00 UTC)
    # This corresponds to 06:00, 12:00, 18:00, and 00:00 Dhaka Time.
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual triggering via the "Run workflow" button

jobs:
  update-cookies:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures full history for stable git pushes

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz

      - name: Execute Updater Script
        env:
          TOFFEE_BEARER_TOKEN: ${{ secrets.TOFFEE_BEARER_TOKEN }}
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if the script modified any files
          if [[ -n $(git status --porcelain) ]]; then
            git add toffee_playlist.json toffee_playlist.m3u
            git commit -m "✅ Auto-Update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "Successfully pushed changes to repository."
          else
            echo "No changes detected in playlist files. Skipping commit."
          fi
