name: Toffee Auto Updater

on:
  schedule:
    # Automatically runs every 6 hours (Dhaka time: 12 AM, 6 AM, 12 PM, 6 PM)
    - cron: '0 */6 * * *'

  workflow_dispatch: # Keeps manual run button enabled

jobs:
  update-cookies:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz

      - name: Decrypt and Unzip Main Script
        env:
          ZIP_PASSWORD: ${{ secrets.ZIP_PASSWORD }}
        run: |
          # Extracting main.py.zip using secret password
          unzip -P "$ZIP_PASSWORD" main.py.zip

      - name: Execute Updater Script
        env:
          TOFFEE_BEARER_TOKEN: ${{ secrets.TOFFEE_BEARER_TOKEN }}
        run: python main.py

      - name: Shred and Clean Decrypted Script
        if: always() # Ensures script is deleted even if workflow fails
        run: |
          # Permanently removing decrypted main.py from runner
          rm -f main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Only modified JSON and M3U files will be pushed to GitHub
          if [[ -n $(git status --porcelain toffee_playlist.json toffee_playlist.m3u) ]]; then
            git add toffee_playlist.json toffee_playlist.m3u
            git commit -m "✅ Auto-Update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
            echo "Successfully pushed changes to repository."
          else
            echo "No changes detected in playlist files. Skipping commit."
          fi
